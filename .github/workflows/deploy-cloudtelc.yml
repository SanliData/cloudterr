# SanliData/cloudtelc repo'suna push -> canlı sunucuya deploy
# Bu workflow cloudtelc reposunda çalışır. Secrets: SSH_HOST, SSH_USER, SSH_PRIVATE_KEY
name: Deploy from cloudtelc

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH (pull from cloudtelc)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd /var/www/cloudtelc
            git fetch https://github.com/SanliData/cloudtelc.git main
            git reset --hard FETCH_HEAD
            npm install
            npm run build
            pm2 restart cloudtelc
